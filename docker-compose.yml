name: mariadb-cluster

# Architektur:
#   haproxy  (IP_HAPROXY)   -> Single-Endpoint :3306, Active/Backup-Failover
#   mariadb1 (IP_MARIADB1)  -> Galera-Knoten, primaer
#   mariadb2 (IP_MARIADB2)  -> Galera-Knoten, Backup (springt bei Ausfall ein)
#   garbd    (IP_GARBD)     -> Galera-Arbitrator (Quorum-Stimme, haelt keine Daten)
#
# Netzwerk-Variablen koennen in .env gesetzt werden.
# scripts/deploy.sh befuellt sie automatisch via portolan (falls verfuegbar).

x-mariadb-base: &mariadb-base
  image: mariadb:11.4
  restart: unless-stopped
  entrypoint: ["/usr/local/bin/galera-entrypoint.sh"]
  healthcheck:
    # Gesund = Galera-Status Synced (4) oder Donor (2, mit mariabackup weiter nutzbar)
    test:
      - CMD-SHELL
      - >-
        s=$$(mariadb -uhealth --connect-timeout=2 -N -B
        -e "SHOW GLOBAL STATUS LIKE 'wsrep_local_state'" | awk '{print $$2}');
        [ "$$s" = "4" ] || [ "$$s" = "2" ]
    interval: 5s
    timeout: 5s
    retries: 5
    start_period: 120s

x-mariadb-env: &mariadb-env
  MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?bitte scripts/deploy.sh ausfuehren oder .env anlegen}
  MARIADB_DATABASE: ${MARIADB_DATABASE:-appdb}
  MARIADB_USER: ${MARIADB_USER:-app}
  MARIADB_PASSWORD: ${MARIADB_PASSWORD:?}
  MARIADB_AUTO_UPGRADE: "1"
  GALERA_CLUSTER_NAME: ${GALERA_CLUSTER_NAME:-mariadb-cluster}
  GALERA_CLUSTER_ADDRESS: gcomm://${IP_MARIADB1:-172.18.0.11},${IP_MARIADB2:-172.18.0.12}
  GALERA_SST_PASSWORD: ${GALERA_SST_PASSWORD:?}
  GALERA_GCACHE_SIZE: ${GALERA_GCACHE_SIZE:-512M}
  INNODB_BUFFER_POOL_SIZE: ${INNODB_BUFFER_POOL_SIZE:-256M}
  HAPROXY_IP: ${IP_HAPROXY:-172.18.0.10}

services:
  mariadb1:
    <<: *mariadb-base
    container_name: mariadb1
    hostname: mariadb1
    environment:
      <<: *mariadb-env
      GALERA_NODE_NAME: mariadb1
      GALERA_NODE_IP: ${IP_MARIADB1:-172.18.0.11}
      GALERA_PEERS: "${IP_MARIADB2:-172.18.0.12}:4567 ${IP_GARBD:-172.18.0.13}:4567"
      # Darf bei leerem Datadir einen NEUEN Cluster gruenden (nur wenn kein Peer laeuft)
      GALERA_BOOTSTRAP_IF_NEW: "1"
      GALERA_FORCE_BOOTSTRAP: ${FORCE_BOOTSTRAP_NODE1:-0}
    volumes:
      - mariadb1_data:/var/lib/mysql
      - ./config/galera-entrypoint.sh:/usr/local/bin/galera-entrypoint.sh:ro
      - ./config/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      db_cluster:
        ipv4_address: ${IP_MARIADB1:-172.18.0.11}

  mariadb2:
    <<: *mariadb-base
    container_name: mariadb2
    hostname: mariadb2
    depends_on:
      - mariadb1
    environment:
      <<: *mariadb-env
      GALERA_NODE_NAME: mariadb2
      GALERA_NODE_IP: ${IP_MARIADB2:-172.18.0.12}
      GALERA_PEERS: "${IP_MARIADB1:-172.18.0.11}:4567 ${IP_GARBD:-172.18.0.13}:4567"
      GALERA_FORCE_BOOTSTRAP: ${FORCE_BOOTSTRAP_NODE2:-0}
    volumes:
      - mariadb2_data:/var/lib/mysql
      - ./config/galera-entrypoint.sh:/usr/local/bin/galera-entrypoint.sh:ro
      - ./config/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      db_cluster:
        ipv4_address: ${IP_MARIADB2:-172.18.0.12}

  garbd:
    build: ./garbd
    container_name: garbd
    restart: unless-stopped
    depends_on:
      - mariadb1
    # Arbitrator: dritte Quorum-Stimme, damit der ueberlebende Knoten bei einem
    # Crash des anderen die Mehrheit (2/3) behaelt und Primary bleibt.
    command:
      - "--group"
      - "${GALERA_CLUSTER_NAME:-mariadb-cluster}"
      - "--address"
      - "gcomm://${IP_MARIADB1:-172.18.0.11}:4567,${IP_MARIADB2:-172.18.0.12}:4567"
    networks:
      db_cluster:
        ipv4_address: ${IP_GARBD:-172.18.0.13}

  haproxy:
    build: ./haproxy
    container_name: haproxy
    restart: unless-stopped
    depends_on:
      - mariadb1
      - mariadb2
    environment:
      IP_MARIADB1: ${IP_MARIADB1:-172.18.0.11}
      IP_MARIADB2: ${IP_MARIADB2:-172.18.0.12}
    ports:
      - "${DB_PORT:-3306}:3306"
      - "${STATS_PORT:-8404}:8404"
    networks:
      db_cluster:
        ipv4_address: ${IP_HAPROXY:-172.18.0.10}

volumes:
  mariadb1_data:
  mariadb2_data:

networks:
  db_cluster:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.18.0.0/24}
          gateway: ${GATEWAY:-172.18.0.1}
