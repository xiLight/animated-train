global
    log stdout format raw local0
    maxconn 4096
    # external-check erlaubt einen echten Galera-Statuscheck per SQL
    external-check
    insecure-fork-wanted
    stats socket /tmp/haproxy.sock mode 660 level admin

defaults
    log global
    mode tcp
    option dontlognull
    timeout connect 5s
    # passend zum MariaDB-Default wait_timeout (8h), damit HAProxy keine
    # laenger idlenden Verbindungen vor der Datenbank kappt
    timeout client 8h
    timeout server 8h

# Status-Seite: http://<host>:8404
listen stats
    bind :8404
    mode http
    stats enable
    stats uri /
    stats refresh 5s

listen mariadb
    bind :3306
    mode tcp
    option external-check
    external-check path "/usr/bin:/bin:/usr/local/bin"
    external-check command /usr/local/bin/galera-check.sh
    # fall 2 / inter 2s: Failover nach ~4-6s. rise 3: erst zurueckschalten,
    # wenn der Knoten stabil gesund ist. shutdown-sessions: bestehende
    # Verbindungen zum toten Knoten sofort kappen, damit Clients neu verbinden.
    default-server check inter 2s fall 2 rise 3 on-marked-down shutdown-sessions
    # Active/Backup: alles geht zu mariadb1; mariadb2 springt nur ein, wenn
    # mariadb1 unhealthy ist - und gibt automatisch zurueck, sobald er heilt.
    server mariadb1 ${IP_MARIADB1}:3306
    server mariadb2 ${IP_MARIADB2}:3306 backup
